<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reaction Test</title>
  <link rel="stylesheet" href="/shared.css" />
  <style>
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding-top: 52px;
      gap: 0;
      background: radial-gradient(circle at top, #3a6a2d, #0d1a0f 48%, #061007 100%);
      color: #f3f0d9;
    }

    nav {
      background: rgba(18, 44, 18, 0.85);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 999px;
      padding: 10px 18px;
      box-shadow: 0 18px 50px rgba(0, 0, 0, 0.24);
    }

    nav a,
    nav .logo,
    nav .current {
      color: #f3f0d9;
    }

    #game-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
      padding: 40px 24px;
      width: 100%;
      max-width: 760px;
      background: rgba(13, 28, 14, 0.88);
      border: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow: 0 35px 80px rgba(0, 0, 0, 0.28);
      border-radius: 36px;
      backdrop-filter: blur(12px);
    }

    #game-area {
      width: 100%;
      max-width: 680px;
      height: 360px;
      border-radius: 28px;
      border: 2px solid #604924;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      user-select: none;
      transition: background 0.18s, box-shadow 0.18s, transform 0.18s;
      background: linear-gradient(135deg, #1f381f 0%, #102614 60%, #09140c 100%);
      gap: 10px;
      position: relative;
      overflow: hidden;
    }

    #game-area::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image: radial-gradient(circle at 20% 20%, rgba(197, 230, 169, 0.08) 0%, transparent 24%),
                        radial-gradient(circle at 85% 30%, rgba(196, 230, 164, 0.05) 0%, transparent 18%),
                        radial-gradient(circle at 50% 75%, rgba(132, 195, 120, 0.08) 0%, transparent 25%),
                        radial-gradient(circle at 10% 85%, rgba(96, 129, 71, 0.15) 0%, transparent 20%),
                        radial-gradient(circle at 90% 80%, rgba(100, 155, 90, 0.12) 0%, transparent 18%);
      pointer-events: none;
    }

    #game-area::after {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at center, rgba(255, 255, 255, 0.08) 0%, transparent 45%);
      pointer-events: none;
    }

    #game-area.waiting  { background: #2a0a0a; border-color: var(--red);    box-shadow: 0 0 60px #ff4d6d30; }
    #game-area.ready    { background: #0a2a14; border-color: var(--green);  box-shadow: 0 0 60px #00e67630; }
    #game-area.too-soon { background: #2a1a00; border-color: var(--orange); box-shadow: 0 0 60px #ff9f4330; }
    #game-area.hit      { background: #420007; border-color: #ff1744; box-shadow: 0 0 60px #ff174430; }
    #game-area.hidden   { display: none; }

    .arrow {
      position: absolute;
      top: 50%;
      left: -160px;
      width: 160px;
      height: 8px;
      background: linear-gradient(90deg, #7a5734, #9b6f46);
      transform: translateY(-50%);
      opacity: 0;
      pointer-events: none;
      box-shadow: inset 0 0 4px rgba(0, 0, 0, 0.25);
    }

    .arrow::before {
      content: '';
      position: absolute;
      left: 8px;
      top: 50%;
      width: 12px;
      height: 16px;
      background: #d9c98b;
      transform: translateY(-50%) rotate(15deg);
      border-radius: 4px 4px 0 0;
      box-shadow: inset 0 1px 2px rgba(0,0,0,0.2);
    }

    .arrow::after {
      content: '';
      position: absolute;
      right: -18px;
      top: 50%;
      transform: translateY(-50%);
      border-top: 10px solid transparent;
      border-bottom: 10px solid transparent;
      border-left: 18px solid #f7f1e3;
    }

    .arrow.shoot {
      opacity: 1;
      animation: arrow-shot 0.45s linear forwards;
    }

    @keyframes arrow-shot {
      from { left: -160px; opacity: 1; }
      to { left: calc(100% - 168px); opacity: 1; }
    }

    #message {
      font-size: 2.2rem;
      font-weight: 800;
      text-align: center;
      padding: 0 28px;
      letter-spacing: -0.5px;
      text-shadow: 0 2px 10px rgba(0, 0, 0, 0.35);
      color: #f7ebd5;
    }

    #game-area.waiting  #message { color: #f7be53; }
    #game-area.ready    #message { color: #9fe88e; }
    #game-area.too-soon #message { color: #f5a623; }
    #game-area.hit      #message { color: #ff8a80; }

    #sub-message {
      font-size: 0.95rem;
      color: #bddbb2;
      text-shadow: 0 1px 4px rgba(0, 0, 0, 0.18);
    }

    #round-dots { display: flex; gap: 10px; }
    #round-dots.hidden { display: none; }

    .dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      background: var(--surface2);
      border: 1px solid var(--border);
      transition: background 0.2s;
    }

    .dot.done   { background: var(--green); border-color: var(--green); }
    .dot.active { background: var(--text);  border-color: var(--text); }

    #results {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      justify-content: center;
    }

    #results.done {
      flex-direction: column;
      align-items: center;
      margin-top: 0;
    }

    #results.done .stat-card { width: 300px; padding: 24px 32px; }
    #results.done .stat-card .label { font-size: 0.8rem; }
    #results.done .stat-card .value { font-size: 3.2rem; }

    #play-again { display: none; }
    #play-again.visible { display: block; }
  </style>
</head>
<body>
  <nav>
    <span class="logo">BG</span>
    <a href="/">Home</a>
    <span class="sep">›</span>
    <span class="current">Reaction Test</span>
  </nav>

  <div id="game-wrap">
    <div id="game-area" role="button" aria-label="Reaction test area" tabindex="0">
      <div class="arrow"></div>
      <div id="message">Click to start</div>
      <div id="sub-message"></div>
    </div>

    <div id="round-dots"></div>

    <div id="results">
      <div class="stat-card">
        <div class="label">Last</div>
        <div class="value" id="last">--</div>
      </div>
      <div class="stat-card">
        <div class="label">Best</div>
        <div class="value" id="best">--</div>
      </div>
      <div class="stat-card">
        <div class="label">Average</div>
        <div class="value" id="avg">--</div>
      </div>
    </div>

    <button id="play-again" class="btn-primary">Play Again</button>
  </div>

  <script src="game.js"></script>
</body>
</html>
