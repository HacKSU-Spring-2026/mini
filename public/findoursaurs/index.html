<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Find Oursaurs - Memory Game</title>
    <link rel="stylesheet" href="/shared.css" />
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 80px 20px 28px;
        }

        .container {
            width: min(900px, 100%);
        }

        .top-bar { display: none; }

        .title-block h1 {
            font-size: 2.2rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--green), #5ab840);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin: 0;
        }

        .title-block p {
            color: var(--muted);
            font-size: 0.9rem;
            margin-top: 4px;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            margin-bottom: 20px;
        }

        .controls {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            align-items: center;
        }

        .difficulty-btn {
            padding: 10px 20px;
            font-family: inherit;
            font-size: 0.88rem;
            font-weight: 700;
            background: var(--surface);
            color: var(--muted);
            border: 1px solid var(--border);
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.15s;
        }
        .difficulty-btn:hover { background: var(--surface2); color: var(--text); }
        .difficulty-btn.active {
            background: linear-gradient(135deg, #1e5c28, #2a7a36);
            color: var(--green);
            border-color: var(--green);
        }

        .game-board {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            margin-bottom: 20px;
            background: var(--surface);
            border: 1px solid var(--border);
            padding: 20px;
            border-radius: 16px;
            min-height: 380px;
        }

        .card {
            background: var(--surface2);
            border: 2px solid var(--border);
            border-radius: 12px;
            cursor: pointer;
            font-size: 2.2rem;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.2s;
            user-select: none;
            min-height: 90px;
            position: relative;
        }

        .card:hover:not(.matched) {
            transform: translateY(-4px);
            border-color: var(--green);
            box-shadow: 0 6px 20px rgba(154, 225, 106, 0.15);
        }

        .card.flipped {
            background: linear-gradient(135deg, #1e5c28, #2a7a36);
            border-color: var(--green);
        }

        .card.matched {
            background: linear-gradient(135deg, #0d3b16, #1a5c22);
            border-color: #4db840;
            cursor: default;
            opacity: 0.85;
        }

        .card.matched::after {
            content: '✓';
            position: absolute;
            top: 4px;
            right: 8px;
            color: var(--green);
            font-size: 1rem;
            font-weight: 800;
        }

        .message {
            text-align: center;
            font-size: 1rem;
            font-weight: 600;
            color: var(--muted);
            min-height: 24px;
            margin-top: 8px;
        }

        .game-over {
            display: none;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 40px;
            text-align: center;
            margin-top: 16px;
        }

        .game-over h2 {
            font-size: 2rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--green), #5ab840);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .game-over p { color: var(--muted); font-size: 1.1rem; }
    </style>
</head>
<body>
    <nav>
        <span class="logo">BG</span>
        <a href="/">Home</a>
        <span class="sep">›</span>
        <span class="current">Find Oursaurs</span>
    </nav>

    <div class="container">
        <div class="top-bar"></div>

        <div class="title-block" style="margin-bottom:20px;">
            <h1>Find Oursaurs</h1>
            <p>Match all dinosaur pairs — test your memory!</p>
        </div>

        <div class="stats">
            <div class="stat-card">
                <div class="label">Moves</div>
                <div class="value" id="moves">0</div>
            </div>
            <div class="stat-card">
                <div class="label">Matches</div>
                <div class="value" id="matches">0</div>
            </div>
            <div class="stat-card">
                <div class="label">Time</div>
                <div class="value" id="time">0s</div>
            </div>
            <div class="stat-card">
                <div class="label">Best</div>
                <div class="value" id="best">—</div>
            </div>
        </div>

        <div class="controls">
            <button class="difficulty-btn active" data-difficulty="easy">Easy (8)</button>
            <button class="difficulty-btn" data-difficulty="medium">Medium (12)</button>
            <button class="difficulty-btn" data-difficulty="hard">Hard (16)</button>
            <button class="btn-primary" id="startBtn">Start Game</button>
        </div>

        <div class="game-board" id="gameBoard"></div>

        <div class="message" id="message">Click Start Game to begin!</div>

        <div class="game-over" id="gameOver">
            <h2>🎉 You Won!</h2>
            <p id="winMessage">Congratulations!</p>
            <button class="btn-primary" onclick="location.reload()" style="margin-top: 8px;">Play Again</button>
        </div>
    </div>

    <script src="game.js"></script>
</body>
</html>
