<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quizosaurs - Dinosaur Trivia</title>
    <link rel="stylesheet" href="/shared.css" />
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 80px 20px 28px;
            overflow-x: hidden;
        }



        .container {
            width: min(780px, 100%);
        }

        .top-bar { display: none; }

        .title-block h1 {
            font-size: 2.2rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--green), #5ab840);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin: 0;
        }
        .title-block p { color: var(--muted); font-size: 0.9rem; margin-top: 4px; }

        .stats {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            margin-bottom: 20px;
        }

        .question-panel {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 32px;
            margin-bottom: 16px;
        }

        .dino-emoji { display: none; }

        .question-text {
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--text);
            text-align: center;
            margin-bottom: 8px;
        }

        .hint-badge {
            text-align: center;
            color: var(--muted);
            font-size: 0.82rem;
            margin-bottom: 24px;
            padding: 8px 16px;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 20px;
            display: inline-block;
            width: 100%;
        }

        .answers {
            display: grid;
            gap: 10px;
            margin-bottom: 20px;
        }

        .answer-btn {
            background: var(--surface2);
            border: 2px solid var(--border);
            border-radius: 12px;
            padding: 14px 20px;
            font-family: inherit;
            font-size: 1rem;
            font-weight: 600;
            color: var(--text);
            cursor: pointer;
            transition: all 0.18s;
            text-align: left;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .answer-btn::before { display: none; }

        .answer-btn:hover:not(:disabled) {
            background: linear-gradient(135deg, #1e5c28, #2a7a36);
            border-color: var(--green);
            transform: translateX(6px);
            color: var(--green);
        }

        .answer-btn.correct {
            background: linear-gradient(135deg, #1a5c22, #2a7a36);
            border-color: var(--green);
            color: var(--green);
        }
        .answer-btn.correct::before { display: none; }

        .answer-btn.wrong {
            background: linear-gradient(135deg, #5c1a1a, #7a2a2a);
            border-color: var(--red);
            color: var(--red);
        }
        .answer-btn.wrong::before  { display: none; }

        .result-area {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 14px 20px;
            text-align: center;
            color: var(--muted);
            font-weight: 600;
            font-size: 1rem;
            margin-bottom: 16px;
        }

        .progress-bar {
            height: 5px;
            background: var(--surface2);
            border-radius: 3px;
            overflow: hidden;
            margin-bottom: 20px;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--green), #5ab840);
            transition: width 0.3s ease;
            border-radius: 3px;
        }

        .actions {
            display: flex;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        @media (max-width: 600px) {
            .stats { grid-template-columns: repeat(2, 1fr); }
            .question-text { font-size: 1.1rem; }
        }
    </style>
</head>
<body>
    <nav>
        <span class="logo">BG</span>
        <a href="/">Home</a>
        <span class="sep">›</span>
        <span class="current">Quizosaurs</span>
    </nav>

    <div class="container">
        <div class="title-block" style="margin-bottom:20px;">
            <h1>Quizosaurs</h1>
            <p>Test your dinosaur knowledge — identify them from clues!</p>
        </div>

        <div class="stats">
            <div class="stat-card">
                <div class="label">Score</div>
                <div class="value" id="score">0</div>
            </div>
            <div class="stat-card">
                <div class="label">Progress</div>
                <div class="value" id="current">0</div>
                <div style="font-size:0.8rem;color:var(--muted);margin-top:2px;">/ <span id="total">10</span></div>
            </div>
            <div class="stat-card">
                <div class="label">Correct</div>
                <div class="value" id="correct">0</div>
            </div>
            <div class="stat-card">
                <div class="label">Streak</div>
                <div class="value" id="streak">0</div>
            </div>
        </div>

        <div class="question-panel">
            <span class="dino-emoji" id="dinoEmoji">🦖</span>
            <div class="question-text" id="questionText">Loading dinosaurs...</div>
            <div class="hint-badge">Fun fact: Dinosaurs ruled Earth for over 165 million years!</div>

            <div class="answers" id="answers"></div>

            <div class="result-area" id="resultText">Click an answer to begin!</div>

            <div class="progress-bar">
                <div class="progress-fill" id="progressFill" style="width:0%"></div>
            </div>

            <div class="actions">
                <button class="btn-ghost" id="skipBtn">Skip</button>
                <button class="btn-primary" id="restartBtn">Restart</button>
            </div>
        </div>
    </div>

    <script src="game.js"></script>
</body>
</html>
